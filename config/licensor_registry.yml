licensors:

  disney:
    display_name: "The Walt Disney Company"
    config_path: "config/disney"
    active: true
    rules:

      # ── R1: Data & SKU Validation (GATE) ──────────────────────
      - id: R1
        name: "Data & SKU Validation"
        is_gate: true
        sub_rules:

          - id: R1.1
            name: "Mandatory Data Validation"
            enabled: true
            config_file: "DISNEY PROPERTIES 7.xlsx"
            required_fields:
              - field: "Style #"
                display: "Style Number"
              - field: "Licensor"
                display: "Licensor"
              - field: "Property"
                display: "Property"
              - field: "Art Ref #"
                display: "Art Reference Number"
              - field: "Item Type"
                display: "Item Type"
              - field: "Customer"
                display: "Customer"
              - field: "Division"
                display: "Division"

          - id: R1.2
            name: "SKU Suffix Validation"
            enabled: true
            config_file: "DISNEY PROPERTIES 7.xlsx"

      # ── R2: Artwork Validation ─────────────────────────────────
      - id: R2
        name: "Artwork Validation"
        is_gate: false
        sub_rules:

          - id: R2.1
            name: "Property-Art Cross Check"
            enabled: false
            config_file: null

          - id: R2.2
            name: "Character Mapping Validation"
            enabled: true
            config_file: "BioWorld Cross Franchise Property Hierarchy_all franchises 10.xlsx"

      # ── R3: Rule Validation ────────────────────────────────────
      - id: R3
        name: "Rule Validation"
        is_gate: false
        sub_rules:

          - id: R3.1
            name: "Property-Specific Rules"
            enabled: false
            config_file: "BioWorld Cross Franchise Property Hierarchy_all franchises 10.xlsx"

          - id: R3.2
            name: "Property Mixing Validation"
            enabled: false
            config_file: null

      # ── R4: Rights Validation ──────────────────────────────────
      - id: R4
        name: "Rights Validation"
        is_gate: false
        sub_rules:

          - id: R4.1
            name: "Rights & Distribution Validation"
            enabled: true
            config_file: "Copy of Disney_Apparel Accessories_New License Summary_term 01012024-12312026  1 1.xlsx"
            config_type: nls

      # ── R5: Packaging & Branding ───────────────────────────────
      - id: R5
        name: "Packaging & Branding"
        is_gate: false
        sub_rules:

          - id: R5.1
            name: "Packaging Rule Validation"
            enabled: false
            config_file: null

          - id: R5.2
            name: "TM Validation"
            enabled: false
            config_file: null
